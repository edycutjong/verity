<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-labelledby="t d">
  <title id="t">Verity (Static)</title>
  <desc id="d">Truth oracle — multi-source data streams converge into a faceted verified gem-core ringed by a reputation arc.</desc>
  <defs>
    <radialGradient id="bg" cx="50%" cy="44%" r="78%">
      <stop offset="0%" stop-color="#06283a"/>
      <stop offset="60%" stop-color="#04111c"/>
      <stop offset="100%" stop-color="#020617"/>
    </radialGradient>
    <radialGradient id="gem" cx="50%" cy="38%" r="65%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="40%" stop-color="#67E8F9"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </radialGradient>
    <linearGradient id="streamStatic" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06B6D4"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="neon" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="b1"/>
      <feGaussianBlur stdDeviation="18" result="b2"/>
      <feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M24 0H0V24" fill="none" stroke="#ffffff" stroke-opacity="0.03" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect width="512" height="512" rx="112" fill="url(#grid)" opacity="0.85"/>

  <!-- Ambient glow -->
  <ellipse cx="256" cy="256" rx="150" ry="150" fill="#06B6D4" filter="url(#soft)" opacity="0.12"/>

  <!-- Converging source streams (data flowing inward) -->
  <g stroke="url(#streamStatic)" stroke-width="6" stroke-linecap="round" stroke-dasharray="10 24" opacity="0.6">
    <line x1="256" y1="93" x2="256" y2="186"/>
    <line x1="399" y1="173" x2="312" y2="226"/>
    <line x1="399" y1="339" x2="312" y2="286"/>
    <line x1="256" y1="419" x2="256" y2="326"/>
    <line x1="113" y1="339" x2="200" y2="286"/>
    <line x1="113" y1="173" x2="200" y2="226"/>
  </g>

  <!-- Source nodes -->
  <g fill="#22d3ee" filter="url(#neon)" opacity="0.8">
    <circle cx="256" cy="91" r="10"/>
    <circle cx="399" cy="173" r="10"/>
    <circle cx="399" cy="339" r="10"/>
    <circle cx="256" cy="421" r="10"/>
    <circle cx="113" cy="339" r="10"/>
    <circle cx="113" cy="173" r="10"/>
  </g>

  <!-- Reputation arc (EWMA) — faint full ring + bright segment at a fixed rotation -->
  <circle cx="256" cy="256" r="128" fill="none" stroke="#0e7490" stroke-width="3" opacity="0.35"/>
  <g transform="translate(256,256) rotate(45)">
    <circle cx="0" cy="0" r="128" fill="none" stroke="#22d3ee" stroke-width="5" stroke-linecap="round"
      stroke-dasharray="180 624" opacity="0.85" filter="url(#neon)"/>
  </g>

  <!-- Verified gem core -->
  <g filter="url(#neon)">
    <g transform="translate(256,256)">
      <polygon points="0,-62 62,-6 0,64 -62,-6" fill="url(#gem)"/>
      <!-- facets -->
      <g stroke="#ffffff" stroke-width="2" opacity="0.55" fill="none" stroke-linejoin="round">
        <polyline points="-62,-6 0,-28 62,-6"/>
        <line x1="0" y1="-62" x2="0" y2="-28"/>
        <line x1="0" y1="-28" x2="0" y2="64"/>
        <line x1="-62" y1="-6" x2="0" y2="64"/>
        <line x1="62" y1="-6" x2="0" y2="64"/>
      </g>
      <polygon points="0,-62 34,-28 -34,-28" fill="#ffffff" opacity="0.5"/>
    </g>
  </g>
</svg>
